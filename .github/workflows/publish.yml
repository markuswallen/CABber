name: Publish NuGet Package

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore CABber.sln
      - run: dotnet build CABber.sln --configuration Release --no-restore
      - run: dotnet test CABber.sln --configuration Release --no-build
      - run: dotnet pack src/CABber/CABber.csproj --configuration Release --no-build --output ./nupkg
      - uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./nupkg/*.nupkg
      - name: Push to NuGet.org
        if: startsWith(github.ref, 'refs/tags/')
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
